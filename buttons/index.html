                box-shadow: 0px 4px 10px 0px rgba(0, 144, 255, 0.33);
                border-color: black;
            }

            .but:hover {
                background-color: black;
                color: white
            }

            .but:active {
                background-color: white;
                color: black;
            }
        </style>
        <body>
            <button class="but" id="bt">hello world</button>
